name: Odoo Addon CI/CD

on:
  push:
    branches: [ main, develop, feat/** ]
  pull_request:
    branches: [ main ]

jobs:
  odoo-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: odoo_test
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m venv venv
        source venv/bin/activate
        pip install wheel setuptools odoo pylint

    - name: Lint Python code
      run: |
        source venv/bin/activate
        pylint models/*.py controllers/*.py

    - name: Run Odoo tests
      run: |
        source venv/bin/activate
        odoo --addons-path=.,odoo/addons --db-filter=odoo_test$ --test-enable --stop-after-init

    - name: Build Addon Package
      run: |
        zip -r my_addon.zip . -x '*.pyc' '__pycache__/*'

